name: Release Minor

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest -v

      - name: Bump version (minor)
        id: bump
        run: |
          poetry version minor
          VERSION=$(poetry version -s)
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Set run title
        run: |
          gh api --method PATCH \
            /repos/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            -f display_title="v${{ steps.bump.outputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update __init__.py version
        run: |
          sed -i "s/__version__ = .*/__version__ = \"${{ steps.bump.outputs.version }}\"/" lambdarunner/__init__.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pyproject.toml lambdarunner/__init__.py
          git commit -m "bump: v${{ steps.bump.outputs.version }}"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin HEAD --tags

      - name: Build dist
        run: poetry build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          files: dist/*
          generate_release_notes: true
