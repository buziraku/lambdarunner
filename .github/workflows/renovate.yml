name: Renovate

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: renovatebot/github-action@v41
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json
